services:
  nofx:
    image: qdw1010/nofx-backend:latest
    container_name: nofx-trading
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "8080:8080"
      - "6060:6060"
    volumes:
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    networks:
      - nofx-network

  nofx-frontend:
    image: qdw1010/nofx-frontend:latest
    container_name: nofx-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - nofx-network
    depends_on:
      - nofx

networks:
  nofx-network:
    driver: bridge